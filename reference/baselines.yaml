# 2002-2005 baseline annual costs used for uplift attribution (spec section 4).
# The increase above these (CPIH-indexed) is attributed to renewables.
# Source: REF April 2025 study Table 2, citing NESO/National Grid historic data.
bsuos:
  value: 400000000
  period: "2002-2005"
  description: Mean annual GB balancing (BSUoS) cost over calendar years 2002-2005 inclusive (the engine's 4-year CPIH baseline window), nominal (£0.4bn/yr per REF Table 2)
  source: REF April 2025 study, Table 2 (citing NESO/National Grid historic balancing cost reporting)
  source_url: https://www.ref.org.uk/ref-blog/390-uk-renewable-electricity-subsidy-totals-2002-to-the-present-day
  verified: false
  note: "Corroborated against REF (April 2025, Table 2) only; primary NESO/Elexon confirmation pending."
tnuos:
  value: 900000000
  period: "2002-2005"
  description: Mean annual TNUoS revenue over calendar years 2002-2005 inclusive (the engine's 4-year CPIH baseline window), nominal (£0.9bn/yr per REF Table 2)
  source: REF April 2025 study, Table 2 (citing NESO/National Grid charging statements)
  source_url: https://www.ref.org.uk/ref-blog/390-uk-renewable-electricity-subsidy-totals-2002-to-the-present-day
  verified: false
  note: "Corroborated against REF (April 2025, Table 2) only; primary NESO/Elexon confirmation pending."
