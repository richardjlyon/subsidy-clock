# REF's published cumulative subsidy totals - the like-for-like cross-check
# for the Clock's whole-period claim (impact I1). NOT a data source.
# Figures read directly from REF Tables 1 (direct) and 2 (indirect),
# cumulative 2002 to FY 2023/24, GBP nominal. Re-verify on REF updates.
source: REF, "UK Renewable Electricity Subsidy Totals 2002 to the Present Day", April 2025, Tables 1 and 2
source_url: https://www.ref.org.uk/ref-blog/390-uk-renewable-electricity-subsidy-totals-2002-to-the-present-day
period: "2002 to FY 2023/24"
# Our annual series is calendar-year; comparing ours <=2023 against REF's
# <=FY2023/24 leaves ~3 months of theirs uncovered by ours - the mismatch
# runs in the conservative direction (understates ours).
ours_through_year: 2023
total_nominal_gbp: 185000000000  # REF's published headline; component rows sum to 185.1 - REF's own rounding
total_real_2024_gbp: 223000000000
verified: true
components:        # cumulative nominal GBP, exactly as published
  ro: 67000000000
  fit: 15300000000
  cfd: 7800000000
  constraints: 1700000000
  rego: 1700000000
  ccl: 27900000000
  tnuos: 20400000000
  bsuos: 18500000000
  ets: 19000000000
  capacity_market: 5800000000
stricter: [ccl, bsuos, ets, rego]   # components where the gap is our deliberate choice
notes:
  cfd: REF's CfD line covers renewable generators including biomass; ours is CfD-renewables, which likewise already includes biomass (Drax and the like). CfD-nuclear contributes nothing in this window - Hinkley Point C payments begin in 2025.
  rego: REGO certificate costs are excluded from the Clock entirely (listed under "What is not included").
  ccl: REF counts total CCL receipts (OBR series, all fuels); we count electricity's share of main-rate receipts plus Carbon Price Support.
  bsuos: REF does not net off direct constraint payments; we do, to avoid double-counting against our constraints line.
  ets: REF counts total ETS receipts (OBR series, all sectors); we count only the power-sector share of auctioned allowance revenue.
  fit: Both series sum the same April-March Ofgem scheme years, so the gap is not a calendar-vs-fiscal timing difference. Ours uses Ofgem's published FIT scheme value (generation + export + qualifying costs); REF's lower figure appears to use a narrower payments basis, plus rounding to GBP 0.1bn. The residual is a definitional difference and is not yet fully reconciled with REF.
  real_terms: "REF's £223bn 2024-price total uses REF's own deflation; the Clock's real column is CPIH-deflated (see methodology #real-terms). The bases are close but not identical."
