# Versioned reference inputs for the INDIRECT subsidy layer (Phase 2).
# Values are nominal GBP, keyed by calendar year. Where the underlying source
# reports fiscal years (Apr-Mar), the value is attributed to the calendar year
# in which the period starts. CCL and ETS store ALREADY-ATTRIBUTED values
# (electricity / power-sector share); TNUoS and bsuos_history store RAW totals
# and attribution happens later in the money model. Refresh annually; cite the
# exact source consulted.
schemes:
  ccl:
    label: Climate Change Levy (electricity share) + Carbon Price Support
    perspectives: []
    cadence: annual
    source: >-
      HMRC Environmental Taxes Bulletin (formerly Climate Change Levy and
      Carbon Price Floor Bulletin), March 2026 edition, tables ODS
      (2026_March_env_tabs_test.ods), Table 1b "CCL and CPF receipts and
      clearances data by calendar year". Value = electricity main-rate
      declared liabilities (the only commodity split HMRC publishes) plus
      estimated CPF receipts (CPS applies solely to fossil fuels used for
      electricity generation, so it is wholly electricity-attributable).
      Sums rounded down to the nearest GBP 0.1m.
    source_url: https://www.gov.uk/government/statistics/climate-change-levy-and-carbon-price-floor-bulletin
    verified: true
    attribution:
      rule: >-
        Electricity's share of CCL main-rate liabilities (HMRC's published
        commodity split of declarations) plus Carbon Price Support receipts,
        which fall wholly on electricity generation. Gas/solid-fuel main-rate
        CCL is excluded.
      confidence: medium
    note: >-
      HMRC publishes the CCL/CPF receipts split by calendar year only from
      2014; for 2013 (CPF started April 2013) the CPF component is therefore
      omitted entirely, so 2013 is understated (conservative). Pre-2013 values
      are electricity main-rate declarations only. Main-rate figures are
      accrued declarations rather than cash receipts because receipts have no
      commodity split.
    annual:
