  bsuos_history:
    label: Balancing Services Use of System, pre-2017 history (raw totals)
    perspectives: []
    cadence: annual
    source: >-
      2005, 2011-2013: NAO "Electricity Balancing Services" (May 2014, HC 41,
      from Ofgem/National Grid data): total balancing costs recovered through
      BSUoS GBP 642m in 2005-06 rising to GBP 1,002m in 2013-14; 2011-12 plus
      2012-13 expenditure totalled GBP 1,723m (split evenly here, the lower
      of NAO and REF figures). 2002-2004: GBP 0.4bn/yr per the verified
      2002-05 baseline (reference/baselines.yaml). 2006-2010 and 2014-2016:
      REF April 2025 study Table 2 total-charge column, pending confirmation
      against National Grid Monthly Balancing Services Summary archives.
    source_url: https://www.nao.org.uk/wp-content/uploads/2014/05/Electricity-Balancing-Services.pdf
    verified: false
    attribution:
      rule: >-
        Raw totals stored; attribution happens in the money model. Only the
        increase above the CPIH-indexed 2002-05 baseline (GBP 0.4bn/yr) is
        attributed, NET of wind constraint payments already counted in the
        direct layer, floored at zero.
      confidence: low
    note: >-
      Raw annual BSUoS for fiscal years starting 2002-2016, i.e. before
      NESO's daily BSUoS dataset begins (April 2017). The money model uses
      these only for years not covered by the bottom-up NESO series. Not
      fully verified: 2006-2010 and 2014-2016 are from REF Table 2's
      total-charge column pending primary confirmation; 2005 and 2011-2013
      are verified against the NAO report; 2002-2004 against the project
      baseline.
