  ets:
    label: Emissions trading (power-sector share of UK auction revenue)
    perspectives: []
    cadence: annual
    source: >-
      Auction revenue: 2012-2018 calendar-year sums of UK EUA auction results
      from the European Commission's UK Phase III Auction Platform Reports
      nos. 57 and 58 (ICE Futures Europe auctions on behalf of BEIS/DECC),
      converted from EUR at Bank of England annual average rates; 2019-2020
      "EU ETS auction income" from the BEIS Annual Report and Accounts
      2020-21 Trust Statement (FY2019-20 GBP 201.4m, FY2020-21 GBP 2,213.1m);
      2021-2024 "UK ETS auction income" from the BEIS/DESNZ Annual Report and
      Accounts Trust Statements (FY2021-22 GBP 5,753.6m, FY2022-23
      GBP 6,049.0m, FY2023-24 GBP 3,407.1m, FY2024-25 GBP 2,521.9m).
      Power-sector share: 2021-2024 from published UK ETS verified emissions
      (electricity generation / total covered: 47.3/107.9, 48.2/110.0,
      37.1/96.8, 30.4/85.6 MtCO2e); 2009-2020 a flat 0.5 estimate.
    source_url: https://www.gov.uk/government/publications/desnz-annual-report-and-accounts-2023-to-2024/trust-statement
    verified: false
    attribution:
      rule: >-
        Power-sector share of AUCTIONED allowance revenue only; free
        allocation excluded. Share taken as electricity generation's share of
        total verified covered emissions - a lower bound, since power
        receives no free allocation and so buys a larger share of auctioned
        allowances than its emissions share.
      confidence: medium
    note: >-
      Not fully verified from primary sources. Unverified elements: 2009-2011
      values (OBR EU ETS receipts series as tabulated in REF's April 2025
      study, x0.5 - DMO Phase II auction results not yet traced); the
      EUR-to-GBP conversion for 2012-2018 (BoE annual average rates, not the
      Treasury's actual settlement rates); and the flat 0.5 power-sector
      share for 2009-2020. 2012 covers ICE auctions only (from November
      2012); any DMO Phase II proceeds that year are excluded (conservative).
      2019 is near-zero because UK auctions were suspended January 2019 to
      March 2020 over Brexit; FY2019-20 income reflects March 2020 auctions
      only. Revenue figures for 2012-2024 are verified (EC auction platform
      reports; BEIS/DESNZ trust statements).
    annual:
