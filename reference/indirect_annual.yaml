  tnuos:
    # the annual series below is raw total revenue; the published scheme series
    # is the attributed uplift money.py derives from it, so the public label
    # must describe that, not the input (2026-06-12 audit item 6)
    label: Transmission Network Use of System (attributed uplift)
    perspectives: []
    cadence: annual
    source: >-
      2023 and 2024: NESO "Final TNUoS Tariffs for 2023/24" (Jan 2023, total
      TNUoS revenue GBP 4,416.4m; implies 2022/23 total GBP 3,594m via the
      stated GBP 822m increase) and "Final TNUoS Tariffs for 2024/25"
      (Jan 2024, MAR Total Revenue GBP 4,188.5m; states a GBP 225.5m decrease
      from 2023/24, implying GBP 4,414m - the lower of the two 2023/24
      figures is used). 2002-2004: GBP 0.9bn/yr per the verified 2002-05
      baseline (reference/baselines.yaml). Intermediate years 2005-2021: REF
      April 2025 study Table 2 total-charge column (in parentheses), itself
      compiled from NESO/Ofgem charging statements - pending primary
      confirmation.
    source_url: https://www.neso.energy/document/301741/download
    verified: false
    attribution:
      rule: >-
        Raw totals stored; attribution happens in the money model. Only the
        increase above the CPIH-indexed 2002-05 baseline (GBP 0.9bn/yr) is
        attributed to renewables, floored at zero.
      confidence: low
    note: >-
      Not fully verified from primary sources. Verified years: 2022-2024
      (NESO Final TNUoS Tariffs documents) and the 2002-2004 baseline level.
      Unverified years: 2005-2021 (values from REF Table 2's total-charge
      column pending confirmation against NESO/National Grid charging
      statements and Ofgem price-control documents). 2024/25 figure is NESO's
      final-tariff-setting forecast of revenue to be recovered.
