# Versioned reference inputs (spec F-6) for schemes whose official costs are
# published annually rather than via an API. Values are nominal GBP for the
# obligation/scheme year STARTING in the keyed calendar year (RO/FIT years run
# 1 Apr - 31 Mar; constraints_history is calendar-year). Refresh annually;
# cite the exact source consulted.
schemes:
  ro:
    label: Renewables Obligation
    perspectives: [renewables, low_carbon]
    cadence: annual
    source: >-
      Ofgem Renewables Obligation Annual Reports. 2024 (SY23): Annual Report
      2024-25 headline scheme value (PDF, RO_24-25_SY23_Annual_Report,
      Mar 2026). 2010-2023 (SY9-SY22): scheme value = total ROCs presented x
      notional worth of a ROC, Figure A4.1 of the SY22 Annual Report
      (2023-24, PDF, Mar 2025), cross-checked against headline values stated
      in the SY22/SY23 report text (SY1 GBP 0.25bn, SY18 GBP 6.31bn, SY19
      GBP 5.73bn, SY22 GBP 6.75bn, SY23 GBP 7.70bn). 2002-2009 (SY1-SY8):
      ROCs presented x worth of a ROC from the compliance tables of Ofgem's
      second annual report (2003-04, Feb 2005), the RO Annual Report
      2004-2005 (Feb 2006), the RO Annual Report 2008-09 (Feb 2010) and the
      RO Annual Report 2010-11 (Mar 2012).
    source_url: https://www.ofgem.gov.uk/publications/renewables-obligation-ro-annual-report-scheme-year-22-april-2023-march-2024
    verified: true
    note: >-
      Scheme value = ROCs presented for compliance x notional worth of a ROC
      (buy-out price + recycle value), Ofgem's own definition of the annual
      value of the scheme. Where Ofgem states a headline value it is used
      directly; otherwise values are computed from Ofgem's published ROC and
      worth figures and rounded down to the nearest GBP 10m (never
      overstated). 2025 (SY24, 2025-26) is omitted: compliance completes
      autumn 2026 and no official outturn or forecast of scheme value has
      been published yet.
    annual:
