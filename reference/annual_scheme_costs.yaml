      2020: 5730000000
      2021: 6360000000
      2022: 6430000000
      2023: 6750000000
      2024: 7700000000
  fit:
    label: Feed-in Tariffs
    perspectives: [renewables, low_carbon]
    cadence: annual
    source: >-
      Ofgem Feed-in Tariffs Annual Report Scheme Year 15 (April 2024 to
      March 2025), Figure 3.3 "FIT scheme value, SY1-15" (PDF,
      feed_in_tariff_annual_report_sy15, Dec 2025). The report states the
      series grew every year from SY1 to SY11 (GBP 1,764m), fell for the
      first time in SY12 (GBP 1,575m), peaked at GBP 1,858m in SY14, and was
      GBP 1,844m in SY15, which fixes the year order of the charted values.
    source_url: https://www.ofgem.gov.uk/transparency-document/feed-tariffs-annual-report-scheme-year-15-april-2024-march-2025
    verified: true
    note: >-
      FIT scheme value per Ofgem: generation payments + export payments +
      qualifying FIT costs (the SY15 value of GBP 1,844m comprises
      GBP 1.73bn generation, GBP 94m export, plus qualifying costs). Values
      are Ofgem's own GBP-million figures, not rounded further. 2025 (SY16,
      2025-26) is omitted: the SY16 annual report has not yet been
      published.
    annual:
      2010: 15000000
      2011: 155000000
      2012: 525000000
      2013: 718000000
      2014: 895000000
      2015: 1151000000
      2016: 1375000000
      2017: 1491000000
      2018: 1529000000
      2019: 1732000000
      2020: 1764000000
      2021: 1575000000
      2022: 1606000000
      2023: 1858000000
      2024: 1844000000
  constraints_history:
    label: Wind constraint payments (pre-backfill history)
    perspectives: [renewables, low_carbon]
    cadence: annual
    source: >-
      Renewable Energy Foundation (REF) online database of wind farm
      constraint payments, "Year" view (Elexon Balancing Mechanism bid
      acceptance data), retrieved 9 June 2026.
    source_url: https://www.ref.org.uk/constraints/index.php?tab=yr
    verified: true
    note: >-
      Calendar-year wind curtailment cost for years before the bottom-up
      Elexon backfill window. The money model uses these only for years not
      covered bottom-up. Figures are Balancing Mechanism trades only; REF
      notes confidential bilateral constraint trades (e.g. ~GBP 12.7m in
      2011) are excluded, so these values are conservative (lower bound).
