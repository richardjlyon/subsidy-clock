# Equivalence factoid pool. Records carry ONLY a unit cost and text tokens —
# never the subsidy total or a count. {full} = the live "£NNNbn+" full-cost
# string; {n} = the live count. Unit costs are high-end published figures so
# counts round DOWN. price_base (optional) must be a year in reference/
# deflators.yaml (2002–2025); omit it for figures already in today's money.
#
# basis: full    -> compares the £NNNbn+ combined real cumulative
# basis: runrate -> compares the annual real-2024 run-rate
- slug: nurses
  unit_gbp: 39043
  basis: runrate
  round_to: 1000
  figure_label: NHS nurses
  frame: a year of this subsidy pays
  sentence: >-
    A year of direct UK renewable subsidy pays the salaries of {n} NHS
    nurses, in today's money.
  label: NHS nurses' annual salaries paid by one year of direct renewable subsidy, in today's money
  source: NHS Employers, Agenda for Change pay scales 2026/27
  source_url: https://www.nhsemployers.org/articles/pay-scales-202627
  as_of: 2026
- slug: homes
  unit_gbp: 393333
  basis: full
  round_to: 1000
  figure_label: social homes
  frame: the {full} full cost would have built
  sentence: >-
