<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>Subsidy Clock — chart share card</title>
<meta name="viewport" content="width=1200">
<style>
  @font-face {
    font-family: "Fraunces";
    src: url("fonts/Fraunces.ttf") format("truetype");
    font-weight: 100 900;
  }
  @font-face {
    font-family: "IBM Plex Sans";
    src: url("fonts/IBMPlexSans.ttf") format("truetype");
    font-weight: 100 900;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #f7f4ee;
    background-image: radial-gradient(rgba(35,33,28,0.025) 1px, transparent 1px);
    background-size: 26px 26px;
    color: #23211c;
    font-family: "IBM Plex Sans", sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .band {
    background: #7a2419;
    color: #f7f4ee;
    padding: 18px 64px;
    font-family: "Fraunces", serif;
    font-weight: 600; font-size: 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid #6f2014;
  }
  .band-left { display: flex; align-items: center; gap: 14px; }
  .tick { width: 13px; height: 13px; border-radius: 50%; background: #f7f4ee; }
  .band-title { font-size: 24px; font-weight: 400; opacity: 0.9; }
  .main { flex: 1; padding: 14px 64px 0; }
  .main svg { width: 100%; height: 100%; }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 64px 22px;
    font-size: 22px; color: #6e6a5f;
  }
  .domain { font-family: "Fraunces", serif; font-weight: 600; color: #7a2419; }
</style>
</head>
<body>
  <div class="band">
    <span class="band-left"><span class="tick"></span>The Subsidy Clock</span>
    <span class="band-title">{{TITLE}}</span>
  </div>
  <div class="main">{{SVG}}</div>
  <div class="foot">
    <span>Warm bars measured &middot; blue bars estimated &middot; 2024 prices &middot; as of {{ASOF}}</span>
    <span class="domain">subsidyclock.co.uk</span>
  </div>
</body>
</html>
