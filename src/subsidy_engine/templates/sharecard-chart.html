<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>Subsidy Clock — chart share card</title>
<meta name="viewport" content="width=1200">
<style>
  @font-face { font-family:"Equity"; src:url("fonts/equity_a_regular.woff2") format("woff2"); font-weight:400; font-style:normal; }
  @font-face { font-family:"Equity"; src:url("fonts/equity_a_bold.woff2") format("woff2"); font-weight:700; font-style:normal; }
  @font-face { font-family:"Concourse"; src:url("fonts/concourse_t3_regular.woff2") format("woff2"); font-weight:400; font-style:normal; }
  @font-face { font-family:"Concourse"; src:url("fonts/concourse_t3_bold.woff2") format("woff2"); font-weight:700; font-style:normal; }

  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #faf7f1;
    background-image: radial-gradient(rgba(22,36,58,0.04) 1px, transparent 1px);
    background-size: 26px 26px;
    color: #23282e;
    font-family: "Concourse", "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .band {
    background: #16243a;
    color: #faf7f1;
    padding: 20px 64px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; font-size: 22px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid #101b2d;
  }
  .band-left { display: flex; align-items: center; gap: 14px; }
  .tick { width: 13px; height: 13px; border-radius: 2px; background: #e3a13c; }
  .band-title {
    font-family: "Equity", Georgia, serif; font-weight: 400; text-transform: none;
    letter-spacing: 0; font-size: 26px; color: #c3cad6;
  }
  .main { flex: 1; padding: 16px 64px 0; }
  .main svg { width: 100%; height: 100%; }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 64px 24px;
    font-size: 22px; color: #5d6470;
  }
  .domain { font-family: "Equity", Georgia, serif; font-weight: 700; color: #16243a; }
</style>
</head>
<body>
  <div class="band">
    <span class="band-left"><span class="tick"></span>The Subsidy Clock</span>
    <span class="band-title">{{TITLE}}</span>
  </div>
  <div class="main">{{SVG}}</div>
  <div class="foot">
    <span>Warm bars measured &middot; blue bars estimated &middot; 2024 prices &middot; as of {{ASOF}}</span>
    <span class="domain">subsidyclock.co.uk</span>
  </div>
</body>
</html>
