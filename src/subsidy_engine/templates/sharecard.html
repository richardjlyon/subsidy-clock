<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Fraunces";
    src: url("fonts/Fraunces.ttf") format("truetype");
    font-weight: 100 900;
  }
  @font-face {
    font-family: "IBM Plex Sans";
    src: url("fonts/IBMPlexSans.ttf") format("truetype");
    font-weight: 100 900;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #f7f4ee;
    background-image: radial-gradient(rgba(35,33,28,0.025) 1px, transparent 1px);
    background-size: 26px 26px;
    color: #23211c;
    font-family: "IBM Plex Sans", sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .band {
    background: #7a2419;
    color: #f7f4ee;
    padding: 22px 64px;
    font-family: "Fraunces", serif;
    font-weight: 600; font-size: 30px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 3px solid #6f2014;
  }
  .tick { width: 14px; height: 14px; border-radius: 50%; background: #f7f4ee; }
  .main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; }
  .figure {
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: 104px;
    line-height: 1.05;
    color: #99311f;
    font-variant-numeric: tabular-nums lining-nums;
    letter-spacing: -1px;
  }
  .label { font-size: 34px; line-height: 1.3; margin-top: 18px; max-width: 1040px; }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0 64px 36px;
    font-size: 26px; color: #6e6a5f;
  }
  .domain { font-family: "Fraunces", serif; font-weight: 600; color: #7a2419; }
</style>
</head>
<body>
  <div class="band"><span class="tick"></span>The Subsidy Clock</div>
  <div class="main">
    <div class="figure">{{FIGURE}}</div>
    <div class="label">{{LABEL}}</div>
  </div>
  <div class="foot"><span>as of {{ASOF}}</span><span class="domain">subsidyclock.co.uk</span></div>
</body>
</html>
