<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>Subsidy Clock — share card</title>
<meta name="viewport" content="width=1200">
<style>
  @font-face { font-family:"Equity"; src:url("fonts/equity_a_regular.woff2") format("woff2"); font-weight:400; font-style:normal; }
  @font-face { font-family:"Equity"; src:url("fonts/equity_a_italic.woff2") format("woff2"); font-weight:400; font-style:italic; }
  @font-face { font-family:"Equity"; src:url("fonts/equity_a_bold.woff2") format("woff2"); font-weight:700; font-style:normal; }
  @font-face { font-family:"Equity Caps"; src:url("fonts/equity_a_caps_regular.woff2") format("woff2"); font-weight:400; font-style:normal; }
  @font-face { font-family:"Concourse"; src:url("fonts/concourse_t3_regular.woff2") format("woff2"); font-weight:400; font-style:normal; }
  @font-face { font-family:"Concourse"; src:url("fonts/concourse_t3_bold.woff2") format("woff2"); font-weight:700; font-style:normal; }

  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; padding: 64px 72px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
    background:
      radial-gradient(130% 150% at 50% -20%, rgba(255,255,255,0.10), transparent 55%),
      linear-gradient(165deg, #9e1b32 0%, #7d1427 100%);
    color: #faf7f1;
    font-family: "Concourse", "Helvetica Neue", Helvetica, Arial, sans-serif;
    position: relative; overflow: hidden;
  }
  /* faint ledger hairline above the foot, brand-style */
  body::after {
    content: ""; position: absolute; left: 72px; right: 72px; bottom: 116px;
    border-top: 1px solid rgba(255,255,255,0.28);
  }

  .top { display: flex; align-items: center; justify-content: space-between; }
  .mark {
    display: inline-flex; align-items: center;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em;
    font-size: 19px; color: #faf7f1;
  }
  .mark .tick {
    width: 12px; height: 12px; border-radius: 2px; background: #fff;
    margin-right: 16px; display: inline-block;
  }
  .site { font-family: "Equity Caps", "Equity", Georgia, serif; letter-spacing: 0.1em; font-size: 18px; color: rgba(255,255,255,0.72); }

  .mid { margin-top: -8px; }
  .figure {
    margin: 0; font-weight: 700;
    font-size: 116px; line-height: 0.96; letter-spacing: -0.025em;
    color: #fff;
    font-variant-numeric: tabular-nums lining-nums; font-feature-settings: "tnum" 1, "lnum" 1;
  }
  /* full-width descriptive line; JS auto-fits 40px -> 30px floor so the
     longest label never overflows (see fitLabel below). */
  .label {
    margin: 22px 0 0; max-width: none;
    font-family: "Equity", Georgia, serif; font-size: 40px; line-height: 1.3; color: rgba(255,255,255,0.94);
  }

  .foot { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .asof { font-size: 22px; color: rgba(255,255,255,0.72); }
  .trace { text-transform: uppercase; letter-spacing: 0.14em; font-size: 15px; color: rgba(255,255,255,0.72); }
</style>
</head>
<body>
  <div class="top">
    <span class="mark"><span class="tick"></span>The Subsidy Clock</span>
    <span class="site">subsidyclock.co.uk</span>
  </div>
  <div class="mid">
    <p class="figure">{{FIGURE}}</p>
    <p class="label">{{LABEL}}</p>
  </div>
  <div class="foot">
    <span class="asof">as of {{ASOF}}</span>
    <span class="trace">Every figure traces to an official source</span>
  </div>
  <script>
    // Shrink the descriptive line only as far as needed so the longest label
    // stays clear of the foot hairline; never below the 30px brand floor.
    function fitLabel() {
      var label = document.querySelector('.label');
      var mid = document.querySelector('.mid');
      var maxBottom = 630 - 116 - 18;
      var size = 40, min = 30;
      label.style.fontSize = size + 'px';
      while (size > min && mid.getBoundingClientRect().bottom > maxBottom) {
        size -= 1; label.style.fontSize = size + 'px';
      }
    }
    window.__fitLabel = fitLabel;
    document.fonts.ready.then(fitLabel);
  </script>
</body>
</html>
