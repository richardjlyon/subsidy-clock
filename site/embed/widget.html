<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>The Subsidy Clock — embedded counter</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    --bg: #f7f4ee; --ink: #23211c; --money: #99311f; --muted: #6e6a5f; --brand: #7a2419;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 8px 14px; overflow: hidden;
  }
  body.dark { --bg: #221f1a; --ink: #f0ece2; --money: #e08a72; --muted: #a39d8d; --brand: #e0c9a8; }
  .fig { font-weight: 700; color: var(--money);
         font-variant-numeric: tabular-nums; font-size: 22px; line-height: 1.1; }
  .what { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .attr { font-size: 10px; margin-top: 3px; }
  .attr a { color: var(--brand); text-decoration: none; font-weight: 600; }
  /* banner 728x90: figure and text side by side */
  body.banner { flex-direction: row; align-items: center; gap: 14px; justify-content: flex-start; }
  body.banner .fig { font-size: 26px; }
  body.banner .meta { min-width: 0; }
  /* card 300x250: stacked, larger figure */
  body.card .fig { font-size: 28px; }
  body.card { text-align: center; }
  /* strip: one line, full width */
  body.strip { flex-direction: row; align-items: baseline; gap: 10px; padding: 4px 14px; }
  body.strip .fig { font-size: 18px; }
  body.strip .what { margin: 0; }
  body.strip .attr { margin: 0; margin-left: auto; }
</style>
</head>
<body>
  <div class="fig" id="fig">£228,091,915,290</div>
  <div class="meta">
    <div class="what"><span id="what">paid to UK renewable generators plus estimated indirect system costs since 2002</span> · as of <span id="asof">21 July 2026</span></div>
    <div class="attr"><a href="https://subsidyclock.co.uk" target="_blank" rel="noopener">The Subsidy Clock — subsidyclock.co.uk</a></div>
  </div>
<script>
(function () {
  'use strict';
  // stamped at build time; the fetch below refreshes them if this file is cached
  var stamped = { "cum": 228091915290.17236, "rate": 634.62236809134, "generated": "2026-07-21T07:57:00.430414+00:00" };

  var q = new URLSearchParams(location.search);
  var size = q.get('size');
  if (size === 'banner' || size === 'card' || size === 'strip') document.body.classList.add(size);
  if (q.get('theme') === 'dark') document.body.classList.add('dark');

  var basis = q.get('basis') === 'nominal' ? 'nominal' : 'real';
  var scope = q.get('scope') === 'direct' ? 'direct' : 'combined';
  document.getElementById('what').textContent = scope === 'combined'
    ? 'paid to UK renewable generators plus estimated indirect system costs since 2002'
    : 'paid to UK renewable generators since 2002';

  function pick(t) {
    var p = t.perspectives.renewables;
    var d = basis === 'real' ? p.real : p;
    var cum = d.cumulative, rate = d.rate_per_sec;
    if (scope === 'combined' && t.indirect) {
      var iv = basis === 'real' ? t.indirect.real : t.indirect;
      cum += iv.cumulative;
      rate += iv.rate_per_sec;
    }
    return { cum: cum, rate: rate };
  }

  function fmtFull(v) { return '£' + Math.floor(v).toLocaleString('en-GB'); }
  function start(cum, rate, generatedIso) {
    var generated = Date.parse(generatedIso);
    var el = document.getElementById('fig');
    function tick() {
      el.textContent = fmtFull(cum + rate * (Date.now() - generated) / 1000);
      setTimeout(tick, 1000);
    }
    tick();
  }

  fetch('../data/totals.json').then(function (r) { return r.json(); }).then(function (t) {
    var v = pick(t);
    var d = new Date(t.generated_at);
    document.getElementById('asof').textContent = d.getUTCDate() + ' ' +
      d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric', timeZone: 'UTC' });
    start(v.cum, v.rate, t.generated_at);
  }).catch(function () {
    start(stamped.cum, stamped.rate, stamped.generated);
  });

  // log embed loads as Matomo events (image tracker: no script, no cookies)
  (function () {
    var ref = '';
    try { ref = new URL(document.referrer).hostname; } catch (e) { ref = 'direct'; }
    var img = new Image();
    img.src = 'https://stats.kwlan.net/matomo.php?idsite=2&rec=1&e_c=embed&e_a=load&e_n=' +
      encodeURIComponent(ref) + '&url=' + encodeURIComponent(location.href);
  })();
})();
</script>
<noscript><style>.fig::after{content:" (static figure)"}</style></noscript>
</body>
</html>
