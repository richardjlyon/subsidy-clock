name: Update data and site

on:
  schedule:
    - cron: "30 5 * * *"   # daily 05:30 UTC - after Elexon/LCCC publish
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Update all schemes (a failing scheme does not block the others)
        run: uv run python -m subsidy_engine update all || echo "::warning::one or more schemes failed - stale data will be flagged on the site"
      - name: Extend constraints history backwards (one week per run)
        run: |
          EARLIEST=$(ls data/raw/constraints/daily | sort | head -1)
          START=$(date -u -d "$EARLIEST - 7 days" +%Y-%m-%d)
          END=$(date -u -d "$EARLIEST - 1 day" +%Y-%m-%d)
          uv run python -m subsidy_engine backfill-constraints --start "$START" --end "$END"
      - run: uv run python -m subsidy_engine build-site
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('uv.lock') }}
      - name: Install Chromium for share cards
        run: uv run playwright install --with-deps chromium
      - name: Rebuild share cards
        # a render failure never blocks the data update - yesterday's dated cards remain live
        run: uv run python -m subsidy_engine build-cards || echo "::warning::share cards failed - previous cards remain"
      - name: Commit updated data
        run: |
          git config user.name "subsidy-counter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data site/data site/share site/s site/embed site/index.html
          git diff --cached --quiet || git commit -m "data: scheduled update $(date -u +%F)"
          git push
      - name: Deploy to Vercel
        # explicit deploy hook: push-triggered auto-deploys have proven unreliable,
        # and a stale live clock is a silent failure
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /dev/null
